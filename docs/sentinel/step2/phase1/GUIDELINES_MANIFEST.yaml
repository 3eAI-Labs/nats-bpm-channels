# Sentinel guideline manifest — nats-bpm-channels, basamak-2 (History Offload)
# Oluşturulma: 2026-07-16 (basamak-2 Sentinel phase1 açılışı).
# Taban: docs/sentinel/phase1/GUIDELINES_MANIFEST.yaml (basamak-1) — BESPOKE şema aynen devralındı.
# Sonraki tüm basamak-2 faz-review'ları bu manifest'i yükler.
project: nats-bpm-channels
scope: basamak-2-history-offload
system_tier: carrier-grade-backend   # telco BPM messaging + history projeksiyon katmanı; UI'sız (headless)
                                     # NOT: basamak-2 minimal history sorgu-API'si getirir (read-only),
                                     #      ama merkezi Admin-UI değildir (bkz. SRS §4.7 platform-compliance notu).

layout_deviation: >
  Basamak-2 teslimatları docs/sentinel/step2/phase1/ altına yazılır (PO-Q1 ONAYLANDI 2026-07-17).
  Gerekçe: basamak-1'in faz klasörleriyle (docs/sentinel/phase1..6/)
  KARIŞMAMASI. Basamak-1 zaten Sentinel standart yerleşiminden (docs/01_product/) sapmıştı
  (basamak-1 PO-Q1, tek-klasör faz-bazlı); basamak-2 bu sapmanın ALTINA bir step2/ katmanı ekler.
  Manifest bu dizinde tutulur.
  Bu manifest BESPOKE şemadır (basamak-1 ile birebir): standart loader'a (load_phase_context.sh)
  beslenmez — loader docs/01_product/ bekler ve exit 3 verir; system_tier T1-T4 şeması dışıdır;
  guideline adları plugin guidelines/*/ dosyalarına çözülmez. Faz-review agent'ları manifest'i bu
  yoldan DOĞRUDAN okur ve disiplinleri manuel denetler. Standart araç entegrasyonu istenirse
  MANIFEST_SCHEMA'ya taşınması gerekir — basamak-1'de olduğu gibi bilinçli yapılmadı.

guidelines:
  enabled:
    - evidence-based-analysis        # her motor/adapter/history-SPI iddiası file:line kanıtlı (docs/07 §3/§7 deseni)
    - no-effort-estimates            # workspace kuralı: süre/kişi-gün/story-point tahmini yasak
    - turkish-docs-english-code      # doküman dili TR; kod/tanımlayıcılar EN
    - traceability-chain             # US <-> FR <-> tasarım kararı (docs/07 D-A…D-G) zinciri zorunlu
    - rejected-alternatives-locked   # reddedilen/ertelenen kararlar yeniden AÇILAMAZ:
                                     #   handler-içi senkron publish, tam-outbox, tam-post-commit (D-A);
                                     #   JetStream-only store, ClickHouse-şimdi (D-B);
                                     #   big-bang cutover, kalıcı dual-run (D-C);
                                     #   sırasız+salt-upsert, global tek-consumer (D-E);
                                     #   üç-motor-birlikte, Flowable-süresiz-dışarıda, Flowable/basamak-2b-şimdi (D-G);
                                     #   token-move tx kaldırılması (basamak-6), büyük değişken (basamak-3), sharding (basamak-5)
    - unverified-claims-tagged       # doğrulanmamış varsayımlar "phase3'te doğrulanacak" etiketli
                                     #   (örn. Cockpit history ACT_HI bağımlılık yüzeyi; handleEvents(List) batch sıklığı;
                                     #    pg_stat_statements history-write fingerprint izolasyonu)
    - locked-decisions-immutable     # D-A…D-G KİLİTLİ (2026-07-15/16); PO-QUESTIONS AÇIK parametreleri sordu ve
                                     #   PO-Q1…7 CEVAPLANDI (2026-07-17): audit-kritik liste kesinleşti (OP_LOG/INCIDENT/
                                     #   EXT_TASK_LOG), N-gün=7 default, sorgu-API=çekirdek-4 desen, KVKK=katmanlı politika,
                                     #   retention=sınıf-bazlı — kararlar teslimatlara işlendi, kilitli D-A…D-G'yi DEĞİŞTİRMEDİ
  disabled:
    - ui-ux-guidelines               # headless katman — merkezi Admin-UI yok (sorgu-API read-only servistir)
    - frontend-security              # kapsam dışı (UI/istemci yok)

compliance:
  # Sürüm-pini (phase1-review F-001): teslimatlardaki guideline atıfları şu sürümlere sabitlidir —
  #   core/DATA_GOVERNANCE.md v4.0, compliance/KVKK.md v1.0, compliance/GDPR.md v1.0.
  #   Guideline sürümü değişirse anchor'lar yeniden doğrulanmalı.
  enabled:
    - KVKK                           # history verisi PII yüzeyinin TA KENDİSİDİR: değişken payload'ları (VARINST/DETAIL),
                                     #   business-key'ler (PROCINST), operatör kimlikleri (OP_LOG userId, TASKINST assignee),
                                     #   incident mesajları. Ayrıntı: DATA_CLASSIFICATION.md (basamak-1 DP-1…8 devralınır,
                                     #   basamak-2 DP-9…16 eklenir). KVKK silme-hakki <-> denetim-izi saklama gerilimi = PO-Q2
                                     #   KATMANLI politika ile ÇÖZÜLDÜ (2026-07-17): (1) audit-kritik yasal-saklama istisnası,
                                     #   (2) bulk PII erasure pipeline, (3) audit-kritik pseudonymization; teslimat = EPIC-G.
    - GDPR                           # AB kiracıları (aynı gerekçe; projeksiyon DB retention/erasure SQL ile — D-B)
  disabled:
    - PCI-DSS                        # kart verisi işlenmez
    - HIPAA                          # sağlık verisi işlenmez

stack:
  # Phase3 (Architect) amendment (2026-07-17): HLD.md'de GERÇEKTEN kullanılan teknolojiler.
  # Her enabled giriş bir Accepted ADR ile yetkilendirilir (ARCHITECT_GUIDELINE §7.5); disabled
  # girişler bilinçle reddedilen/ertelenen — ADR/karar gerekçeli. Hiç değerlendirilmemiş teknoloji
  # LİSTELENMEZ (pseudonym kasası deposu ARCH-Q2 KARAR 2026-07-18 = ayrı Postgres, ADR-0016 Kabul;
  # OpenBao kiracı-deployment seçeneği olarak not edildi, çekirdekte reddedilmedi → listelenmez).
  # BESPOKE şema; basamak-1 ile yorum stili tutarlı.
  enabled:
    - NATS_JETSTREAM                 # history teli + DLQ + relay leader KV-lease; iki yayın yolu tek substratta
                                     #   (ADR-0010 relay/outbox, ADR-0011 instance-partition, ADR-0013 wire-contract,
                                     #    ADR-0019 stream retention + subject-authz; basamak-1 ADR-0002/0006/0008 devralınır)
    - POSTGRES                       # ayrı projeksiyon store (L3, denormalize, range-partition) + retention/erasure SQL
                                     #   (ADR-0011 projeksiyon, ADR-0017 erasure, ADR-0018 retention;
                                     #    pseudonym kasası deposu = ayrı Postgres — ADR-0016 Kabul, ARCH-Q2 KARAR 2026-07-18)
    - JAVA                           # composite HistoryEventHandler + relay + post-commit publisher + projeksiyon
                                     #   consumer + sorgu-API; fork motor JVM (Java 21 build — memory build-requires-java21)
                                     #   (ADR-0009 handler plug-in, ADR-0010 yayın topolojisi, ADR-0014 sorgu-API)
  disabled:
    - KAFKA                          # REDDEDİLDİ: substrat NATS/JetStream (docs/01 §6 pinli; basamak-1 ADR-0006
                                     #   AsyncAPI/NATS deseni). Async idiom NATS'ta; Kafka yeni ağır bağımlılık, tez-dışı.
                                     #   (asıl gerekçe docs/01 §6 substrat-pini + basamak-1 ADR-0006; ADR-0013 bu pinin
                                     #    history-teline uygulanmasıdır — Kafka'yı ismen tartışmaz [phase3-review F-005].
                                     #    ARCHITECT_GUIDELINE default Kafka'dan bilinçli sapma: düşük-latency + KV-lease + mevcut substrat)
    - CLICKHOUSE                     # ERTELENDİ (D-B): hacim-tetikli ayrı karar; kontrat sabit kaldığından consumer
                                     #   değişimi izole (NFR-M4). Şimdi yeni ops yüzeyi açılmaz. (gerekçe ADR-0011)

review:
  spot_check_minimum: 5              # faz-review başına en az 5 file:line doğrulaması (docs/07 §3 kanıt haritası taban)
  phase_gate: >
    MAJOR bulgular çözülmeden (veya yazılı gerekçeli kabul verilmeden) bir sonraki faza geçilmez;
    KOŞULLU ONAY'da MINOR'lar bir sonraki fazla paralel kapatılabilir. Basamak-2'ye özgü ek kapı:
    kilitli D-A…D-G kararlarına aykırı bir teslimat MAJOR sayılır (rejected-alternatives-locked ihlali).
