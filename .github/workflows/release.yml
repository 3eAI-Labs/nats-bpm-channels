name: Release

on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
          server-id: ossrh
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Publish to Maven Central
        # cadenzaflow-nats-channel ATLANIR (-DskipCadenzaflow): fork motoru Maven Central'da
        # olmadığından hem CI'da çözülemez hem de Central'a yayınlanamaz (tüketici resolve edemez).
        # Yayınlanabilir artefaktlar: nats-core, flowable/camunda-nats-channel, nats-bpm-bench,
        # nats-history-projection. (Bu adım ayrıca OSSRH+GPG secret'ları gerektirir — repo settings.)
        run: mvn deploy --batch-mode --no-transfer-progress -P release -DskipTests -DskipCadenzaflow
        env:
          MAVEN_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.OSSRH_TOKEN }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
