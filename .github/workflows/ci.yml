name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        # cadenzaflow-nats-channel'ı ATLA: fork motoru (org.cadenzaflow.bpm:cadenzaflow-engine,
        # provided) Maven Central'da yok, CI temiz checkout'ta çözülemez. -DskipCadenzaflow parent
        # pom'daki `cadenzaflow-mirror` profile'ını devre dışı bırakır (bkz. pom.xml <profiles>).
        # camunda-nats-channel byte-aynası olduğundan davranış CI'da yine kapsanır.
        run: mvn verify --batch-mode --no-transfer-progress -DskipCadenzaflow
